name: Release

# Builds the PyInstaller bundle and publishes it as a GitHub Release.
#
# Trigger options:
#   - Push a tag matching `v*` (e.g. `git tag v0.2 && git push --tags`).
#     The tag name becomes the release name and is treated as the version.
#   - Manually from the Actions tab via "Run workflow", entering the tag name.
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name (e.g. v0.2). A tag with this name will be created on the current commit if it does not exist.'
        required: true

permissions:
  contents: write   # needed to create the release and upload assets

jobs:
  build-windows:
    name: Build & release (Windows)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller==6.20.0

      - name: Determine tag
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF#refs/tags/}"
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "zip=coco2-${TAG}-windows.zip" >> "$GITHUB_OUTPUT"

      - name: Build with PyInstaller
        run: pyinstaller --noconfirm --clean coco2.spec

      - name: Package dist as zip
        shell: pwsh
        run: |
          $zip = "${{ steps.meta.outputs.zip }}"
          Compress-Archive -Path dist/coco2/* -DestinationPath $zip -Force
          Write-Host "Created $zip"
          Get-Item $zip | Select-Object Name, Length

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: coco2 ${{ steps.meta.outputs.tag }}
          generate_release_notes: true
          files: ${{ steps.meta.outputs.zip }}
          body: |
            ## Installation

            1. Download `${{ steps.meta.outputs.zip }}` and extract it.
            2. Download ExifTool (Windows Executable) from <https://exiftool.org/>.
               Place `exiftool.exe` and the `exiftool_files/` folder **next to
               `coco2.exe`** inside the extracted folder.
            3. Run `coco2.exe`.

            ExifTool is not bundled with the release for licensing/freshness
            reasons; the application falls back to a system PATH lookup and an
            optional `config.ini` override (see README).
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
